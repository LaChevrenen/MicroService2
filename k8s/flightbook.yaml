apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flightbook-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: flightbook.infres.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flightbook-service
                port:
                  number: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: flightbook-service
  labels:
    run: flightbook
spec:
  selector:
    app: flightbook
  ports:
    - protocol: TCP
      port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flightbook
  labels:
    app: flightbook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flightbook
  template:
    metadata:
      labels:
        app: flightbook
    spec:
      containers:
        - name: flightbook
          image: registry.infres.fr/flightbook:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: KEYCLOAK_JWKS_URL
              value: "http://keycloak:8080/realms/flightbook/protocol/openid-connect/certs"
            - name: KEYCLOAK_ISSUER
              value: "http://localhost:8180/realms/flightbook"
