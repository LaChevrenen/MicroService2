services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: keycloak-flightbook
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak-realm-export.json:/opt/keycloak/data/import/flightbook-realm.json
    command: start-dev --import-realm

  flightbook:
    build: ./java-rest-server
    container_name: flightbook-app
    ports:
      - "8080:8080"
    environment:
      # Depuis le container, Keycloak est joignable via le nom du service Docker
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/flightbook/protocol/openid-connect/certs
      # L'issuer dans le JWT est toujours celui vu par le navigateur (localhost:8180)
      KEYCLOAK_ISSUER: http://localhost:8180/realms/flightbook
    depends_on:
      - keycloak
