<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightBook — Réservation de vols</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4f8; color: #1a202c; }

        header { background: #1a365d; color: white; padding: 1.5rem 2rem; }
        header h1 { font-size: 1.6rem; }
        header p  { opacity: 0.65; font-size: 0.9rem; margin-top: 0.2rem; }

        main { max-width: 1050px; margin: 2rem auto; padding: 0 1rem; }

        .controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        button {
            background: #2b6cb0;
            color: white;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88rem;
            transition: background 0.15s;
        }
        button:hover { background: #2c5282; }

        select {
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
            font-size: 0.88rem;
            background: white;
            color: #1a202c;
            cursor: pointer;
        }

        #status { font-size: 0.85rem; color: #718096; margin-left: auto; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 1.25rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border-left: 4px solid #2b6cb0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.85rem;
        }
        .compagnie { font-weight: 700; font-size: 1rem; color: #1a365d; }
        .numero {
            font-size: 0.8rem;
            background: #ebf4ff;
            color: #2b6cb0;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            font-weight: 600;
        }

        .card-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .info-item label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #a0aec0;
            display: block;
            margin-bottom: 0.1rem;
        }
        .info-item span { font-size: 0.9rem; font-weight: 500; }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }
        .prix { font-size: 1.3rem; font-weight: 700; color: #276749; }

        .btn-reserver {
            background: #276749;
            font-size: 0.82rem;
            padding: 0.45rem 0.9rem;
        }
        .btn-reserver:hover { background: #22543d; }

        .btn-detail {
            background: #718096;
            font-size: 0.82rem;
            padding: 0.45rem 0.9rem;
        }
        .btn-detail:hover { background: #4a5568; }

        /* panneau détail sous la carte (Route 2) */
        .detail-panel {
            margin-top: 0.75rem;
            background: #f7fafc;
            border-radius: 6px;
            padding: 0.75rem;
            font-size: 0.82rem;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .detail-panel.open { display: block; }
        .detail-panel p { margin: 0.2rem 0; }
        .detail-panel strong { color: #2b6cb0; }

        /* toast de confirmation (Route 5) */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #276749;
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            text-align: center;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .message { text-align: center; padding: 2.5rem; color: #718096; }
        .error { color: #c53030; }
    </style>
</head>
<body>

<header>
    <h1>FlightBook</h1>
    <p>Service de réservation de vols</p>
</header>

<main>
    <div class="controls">
        <!-- Route 1 -->
        <button onclick="chargerTousLesVols()">Tous les vols</button>

        <!-- Route 3 + Route 4 -->
        <select id="filtreCompagnie" onchange="filtrerParCompagnie()" disabled>
            <option value="">Filtrer par compagnie…</option>
        </select>

        <span id="status"></span>
    </div>

    <div id="container">
        <p class="message">Cliquez sur "Tous les vols" pour afficher les vols disponibles.</p>
    </div>
</main>

<div id="toast"></div>

<script>
    // ─── Init : charge les compagnies pour le filtre (Route 3) ───────────────
    window.addEventListener('load', async () => {
        try {
            const res = await fetch('api/compagnies');
            if (!res.ok) throw new Error();
            const compagnies = await res.json();
            const sel = document.getElementById('filtreCompagnie');
            compagnies.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                sel.appendChild(opt);
            });
            sel.disabled = false;
        } catch (_) {}
    });

    // ─── Route 1 : GET /api/vols ─────────────────────────────────────────────
    async function chargerTousLesVols() {
        document.getElementById('filtreCompagnie').value = '';
        setStatus('Chargement…');
        try {
            const res = await fetch('api/vols');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const vols = await res.json();
            afficherVols(vols);
            setStatus(vols.length + ' vol(s) trouvé(s)');
        } catch (e) {
            afficherErreur(e.message);
        }
    }

    // ─── Route 4 : GET /api/compagnies/{nom}/vols ────────────────────────────
    async function filtrerParCompagnie() {
        const nom = document.getElementById('filtreCompagnie').value;
        if (!nom) { chargerTousLesVols(); return; }
        setStatus('Chargement…');
        try {
            const res = await fetch('api/compagnies/' + encodeURIComponent(nom) + '/vols');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const vols = await res.json();
            afficherVols(vols);
            setStatus(vols.length + ' vol(s) pour ' + nom);
        } catch (e) {
            afficherErreur(e.message);
        }
    }

    // ─── Route 2 : GET /api/vols/{id} ────────────────────────────────────────
    async function voirDetail(id) {
        const panel = document.getElementById('detail-' + id);
        if (panel.classList.contains('open')) {
            panel.classList.remove('open');
            return;
        }
        panel.textContent = 'Chargement…';
        panel.classList.add('open');
        try {
            const res = await fetch('api/vols/' + id);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const v = await res.json();
            panel.innerHTML =
                '<p><strong>ID :</strong> ' + v.id + '</p>' +
                '<p><strong>Compagnie :</strong> ' + v.compagnie + '</p>' +
                '<p><strong>Numéro :</strong> ' + v.numero + '</p>' +
                '<p><strong>Place :</strong> ' + v.place + '</p>' +
                '<p><strong>Prix :</strong> ' + v.prix.toFixed(2) + ' €</p>' +
                '<p><strong>Date :</strong> ' + formatDate(v.date) + '</p>';
        } catch (e) {
            panel.textContent = 'Erreur : ' + e.message;
        }
    }

    // ─── Route 5 : POST /api/reservations?volId={id} ─────────────────────────
    async function reserver(id) {
        try {
            const res = await fetch('api/reservations?volId=' + id, { method: 'POST' });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const resa = await res.json();
            afficherToast('Réservation confirmée !\nRéf. ' + resa.reference + ' — ' + resa.compagnie + ' ' + resa.numero);
        } catch (e) {
            afficherToast('Erreur réservation : ' + e.message);
        }
    }

    // ─── Helpers ─────────────────────────────────────────────────────────────
    function afficherVols(vols) {
        const container = document.getElementById('container');
        if (vols.length === 0) {
            container.innerHTML = '<p class="message">Aucun vol trouvé.</p>';
            return;
        }
        container.innerHTML = '<div class="grid">' + vols.map(volCard).join('') + '</div>';
    }

    function volCard(vol) {
        return `
        <div class="card">
            <div class="card-header">
                <span class="compagnie">${vol.compagnie}</span>
                <span class="numero">${vol.numero}</span>
            </div>
            <div class="card-info">
                <div class="info-item">
                    <label>Date</label>
                    <span>${formatDate(vol.date)}</span>
                </div>
                <div class="info-item">
                    <label>Place</label>
                    <span>${vol.place}</span>
                </div>
            </div>
            <div class="card-footer">
                <span class="prix">${vol.prix.toFixed(2)} €</span>
                <div style="display:flex;gap:0.4rem">
                    <button class="btn-detail" onclick="voirDetail(${vol.id})">Détails</button>
                    <button class="btn-reserver" onclick="reserver(${vol.id})">Réserver</button>
                </div>
            </div>
            <div class="detail-panel" id="detail-${vol.id}"></div>
        </div>`;
    }

    function formatDate(dateStr) {
        return new Date(dateStr).toLocaleDateString('fr-FR', {
            day: '2-digit', month: 'short', year: 'numeric'
        });
    }

    function setStatus(msg) {
        document.getElementById('status').textContent = msg;
    }

    function afficherErreur(msg) {
        document.getElementById('container').innerHTML =
            '<p class="message error">Erreur : ' + msg + '</p>';
        setStatus('');
    }

    function afficherToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3500);
    }
</script>

</body>
</html>
