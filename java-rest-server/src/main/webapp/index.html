<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightBook — Réservation de vols</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-content">
        <div>
            <h1>FlightBook</h1>
            <p>Service de réservation de vols</p>
        </div>
        <div id="userZone"></div>
    </div>
</header>

<main>
    <div class="controls">
        <button onclick="chargerTousLesVols()">Tous les vols</button>
        <select id="filtreCompagnie" onchange="filtrerParCompagnie()" disabled>
            <option value="">Filtrer par compagnie…</option>
        </select>
        <span id="status"></span>
    </div>
    <div id="container">
        <p class="message">Cliquez sur "Tous les vols" pour afficher les vols disponibles.</p>
    </div>
</main>

<div id="toast"></div>

<script src="http://localhost:8180/js/keycloak.js"></script>
<script src="app.js"></script>
</body>
</html>
